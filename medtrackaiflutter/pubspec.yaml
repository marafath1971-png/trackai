name: medtrackaiflutter
description: MedTrackAI - Your intelligent medicine tracker
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^13.0.1
  
  # HTTP / API
  http: ^1.2.0
  
  # Fonts
  google_fonts: ^6.2.1
  
  # Image picker (camera + gallery)
  image_picker: ^1.0.7
  
  # QR Code generation
  qr_flutter: ^4.1.0
  # Local notifications
  flutter_local_notifications: ^21.0.0
  
  # Date/time
  intl: ^0.19.0
  
  # File handling
  path_provider: ^2.1.5
  path: ^1.9.0
  
  # Share
  share_plus: ^12.0.1
  
  # UUID for IDs
  uuid: ^4.3.3
  
  # Animations
  flutter_animate: ^4.5.0
  
  cupertino_icons: ^1.0.2
  timezone: ^0.11.0

  # ── Firebase ────────────────────────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  cloud_functions: ^5.3.4
  google_sign_in: ^6.2.2
  camera: ^0.12.0
  image: ^4.5.0
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^6.0.0
  logger: ^2.6.2
  flutter_image_compress: ^2.4.0
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  firebase_performance: ^0.10.1+10
  pdf: ^3.11.3
  printing: ^5.14.2
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.0.0
  flutter_timezone: ^5.0.0
  mobile_scanner: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - .env


